name: Nightly Memory Backup

on:
  schedule:
    - cron: '0 12 * * *' # 00:00 SGT (UTC+8 -> 12:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "openclaw-bot"
          git config user.email "openclaw-bot@example.com"

      - name: Create backup branch
        id: branch
        run: |
          BRANCH="backup/$(date +%F)"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          git switch -c "$BRANCH"

      - name: Copy memory files
        run: |
          mkdir -p backups/$(date +%F)
          cp -a memory backups/$(date +%F)/ || true
          cp MEMORY.md backups/$(date +%F)/ || true

      - name: Commit backup
        run: |
          git add backups
          git commit -m "chore: nightly backup of memory files for $(date +%F)" || echo "No changes to commit"

      - name: Push backup branch
        run: |
          git push origin HEAD
